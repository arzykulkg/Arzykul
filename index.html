<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Raleway:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#1a1410;--bg2:#2d2520;--bg3:#3d3228;
  --gold:#D4A574;--gold2:#E8C9A0;--gold-glow:rgba(212,165,116,.35);--gold-soft:rgba(212,165,116,.12);
  --accent:#1F7BA0;--accent2:#2A9FD8;--accent-glow:rgba(31,123,160,.4);--accent-soft:rgba(31,123,160,.15);
  --node:#3a3228;--border:#5a4d42;
  --text:#F5E6D3;--text2:#D4C4B8;--text3:#8B7D6F;
  --female:#C41E3A;--fem-glow:rgba(196,30,58,.35);--fem-soft:rgba(196,30,58,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text)}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    radial-gradient(circle at 22% 28%,rgba(212,165,116,.08) 0%,transparent 55%),
    radial-gradient(circle at 78% 72%,rgba(31,123,160,.06) 0%,transparent 55%),
    repeating-linear-gradient(45deg,transparent,transparent 35px,rgba(212,165,116,.04) 35px,rgba(212,165,116,.04) 70px),
    repeating-linear-gradient(-45deg,transparent,transparent 35px,rgba(31,123,160,.04) 35px,rgba(31,123,160,.04) 70px);
  background-size:100% 100%,100% 100%,100% 100%,100% 100%;z-index:0;
}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(135deg,rgba(45,37,32,.98) 0%,rgba(61,50,40,.98) 100%);backdrop-filter:blur(14px);
  border-bottom:2px solid var(--gold);box-shadow:0 4px 20px rgba(0,0,0,.4);
  display:flex;align-items:center;height:56px;
}
.tb-logo{width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;border-right:2px solid var(--gold);flex-shrink:0;}
.tb-search{flex:1;display:flex;align-items:center;gap:10px;padding:0 18px;height:100%;}
.tb-search input{flex:1;background:rgba(255,255,255,.08);border:1px solid var(--gold);outline:none;color:var(--text);font-family:'Raleway',sans-serif;font-size:.9rem;padding:8px 12px;border-radius:8px;transition:all .3s;}
.tb-search input::placeholder{color:var(--text3)}
.tb-search input:focus{background:rgba(255,255,255,.12);border-color:var(--accent2);box-shadow:0 0 12px var(--gold-glow)}
.tb-icon{color:var(--gold);font-size:.9rem;flex-shrink:0}
.tb-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.8rem;padding:4px 8px;border-radius:6px;transition:color .15s;}
.tb-clear:hover{color:var(--gold)}
.tb-reset{
  margin-right:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#1a1410;
  cursor:pointer;font-size:.8rem;padding:7px 16px;border-radius:100px;
  font-family:'Raleway',sans-serif;font-weight:600;transition:all .2s;white-space:nowrap;
  box-shadow:0 2px 8px var(--gold-glow);
}
.tb-reset:hover{transform:translateY(-2px);box-shadow:0 4px 12px var(--gold-glow)}

/* CANVAS */
#canvas{
  position:fixed;top:56px;left:0;right:0;bottom:0;
  overflow:hidden;z-index:5;cursor:grab;
}
#canvas:active{cursor:grabbing}
#scene{position:absolute;transform-origin:0 0;will-change:transform;}

/* SVG LINES */
#lines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

/* NODE PILL */
.node{
  position:absolute;display:flex;align-items:center;gap:10px;
  padding:10px 16px 10px 10px;border-radius:100px;
  border:2px solid var(--gold);background:linear-gradient(135deg,var(--node),rgba(61,50,40,.8));
  cursor:pointer;user-select:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3);
  transition:border-color .2s,box-shadow .2s,transform .15s,opacity .3s;
}
.node:hover{border-color:var(--accent2);box-shadow:0 0 20px var(--accent-glow);transform:scale(1.05)}
.node.female:hover{border-color:var(--female);box-shadow:0 0 20px var(--fem-glow)}
.node.expanded{
  background:linear-gradient(135deg,var(--accent),rgba(31,123,160,.9));
  border-color:var(--accent2);box-shadow:0 0 30px var(--accent-glow);
}
.node.expanded.female{
  background:linear-gradient(135deg,var(--female),rgba(196,30,58,.9));
  border-color:var(--female);box-shadow:0 0 30px var(--fem-glow);
}
.node.leaf-node{cursor:default;opacity:.75}
.node.leaf-node:hover{transform:none;border-color:var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.node.dimmed{opacity:.4}

.n-av{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:700;color:#1a1410;flex-shrink:0;
  font-family:'Playfair Display',serif;
}
.node.expanded .n-av{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.4);color:#fff}
.node.has-kids .n-av{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent2)}
.node.female.has-kids .n-av{background:var(--fem-soft);border-color:var(--female);color:var(--female)}
.n-nm{font-size:.88rem;font-weight:600;color:var(--text);font-family:'Playfair Display',serif;letter-spacing:.3px}
.node.expanded .n-nm{color:#fff;font-weight:700}
.node.has-kids .n-nm{font-weight:700;color:var(--text2)}
.n-ct{
  width:24px;height:24px;border-radius:50%;
  background:var(--accent-soft);display:flex;align-items:center;justify-content:center;
  font-size:.68rem;font-weight:700;color:var(--accent2);flex-shrink:0;margin-left:2px;
}
.node.female .n-ct{background:var(--fem-soft);color:var(--female)}
.node.expanded .n-ct{background:rgba(255,255,255,.2);color:rgba(255,255,255,.9)}

/* SEARCH OVERLAY */
#srOverlay{
  position:fixed;top:56px;left:0;right:0;bottom:0;z-index:200;
  background:linear-gradient(135deg,rgba(26,20,16,.98),rgba(45,37,32,.98));backdrop-filter:blur(8px);
  overflow-y:auto;padding:20px;display:none;border-top:2px solid var(--gold);
}
.sr-item{padding:12px 18px;border-radius:12px;cursor:pointer;border:2px solid var(--gold);background:linear-gradient(135deg,var(--node),rgba(61,50,40,.7));margin-bottom:10px;font-size:.88rem;transition:all .2s;color:var(--text);}
.sr-item:hover{background:linear-gradient(135deg,var(--accent),rgba(31,123,160,.8));border-color:var(--accent2);color:#fff;transform:translateX(4px)}
.sr-path{font-size:.75rem;color:var(--text3);margin-top:4px;font-family:'Raleway',sans-serif}
.sr-none{text-align:center;color:var(--text3);padding:50px 20px;font-size:.95rem}

/* CONTROLS */
#controls{position:fixed;bottom:24px;right:20px;z-index:100;display:flex;flex-direction:column;gap:10px;}
.ctrl-btn{
  width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),rgba(31,123,160,.85));border:2px solid var(--gold);
  color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.4);font-weight:600;
}
.ctrl-btn:hover{transform:translateY(-4px);box-shadow:0 8px 20px var(--accent-glow);border-color:var(--accent2)}
.admin-overlay,
#adminPanel{
  display:none!important;
}
.admin-overlay{
  position:fixed;bottom:120px;right:20px;top:auto;z-index:250;
  width:min(420px,calc(100vw - 32px));
}
.admin-overlay.open{display:block!important;}
#adminPanel.open{display:block!important;}
.admin-box{
  width:100%;padding:18px 20px;border-radius:20px;
  background:rgba(18,14,12,.98);border:1px solid rgba(255,255,255,.14);
  box-shadow:0 18px 52px rgba(0,0,0,.45);
}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.admin-title{font-size:1.05rem;font-weight:700;color:var(--gold);}
.admin-close{background:none;border:none;color:var(--text2);font-size:1.1rem;cursor:pointer;}
.admin-close:hover{color:var(--gold);}
.admin-form{display:grid;gap:12px;}
.admin-field{display:flex;flex-direction:column;gap:6px;font-size:.88rem;color:var(--text2);}
.admin-field label{font-size:.86rem;color:var(--text);}
.admin-field input,.admin-field select,.admin-field textarea{
  width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(212,165,116,.3);
  background:rgba(255,255,255,.06);color:var(--text);outline:none;font-family:'Raleway',sans-serif;
}
.admin-field input:focus,.admin-field select:focus,.admin-field textarea:focus{
  border-color:var(--accent2);box-shadow:0 0 14px rgba(212,165,116,.16);
}
.admin-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;margin-top:6px;}
.admin-btn{border:none;padding:11px 16px;border-radius:12px;cursor:pointer;font-weight:700;font-family:'Raleway',sans-serif;}
.admin-btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1410;}
.admin-btn.secondary{background:rgba(255,255,255,.08);color:var(--text2);border:1px solid rgba(255,255,255,.08);}
.admin-status{min-height:1.2rem;font-size:.85rem;color:var(--text3);}
.admin-status.success{color:#8ee39b;}
.admin-status.error{color:#ff9f9b;}
.admin-panel{position:fixed;right:20px;bottom:90px;z-index:220;width:min(420px,calc(100vw - 32px));background:rgba(15,12,10,.96);border:1px solid rgba(255,255,255,.12);border-radius:20px;box-shadow:0 22px 50px rgba(0,0,0,.45);padding:22px;display:none;backdrop-filter:blur(18px);}
.admin-panel.open{display:block;}
.admin-panel .panel-title{font-size:1rem;font-weight:700;color:#f7e6c7;font-family:'Playfair Display',serif;margin-bottom:14px;}
.admin-panel .panel-row{display:grid;gap:14px;margin-bottom:14px;}
.admin-note{font-size:.85rem;color:#d9c8b3;line-height:1.5;}
.admin-field input,.admin-field select,.admin-field textarea{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);color:#f8f1e6;}
.admin-field input::placeholder{color:rgba(248,241,230,.65);}
.admin-field select{appearance:none;-webkit-appearance:none;-moz-appearance:none;}
.admin-field label{color:#f5e6d3;}
.admin-actions .admin-btn.primary{background:linear-gradient(135deg,#f2c97f,#f7e6c7);color:#1a1410;}
.admin-actions .admin-btn.secondary{background:rgba(255,255,255,.1);color:#f3e8d7;border-color:rgba(255,255,255,.18);}
</style>
</head>
<body>

<div id="topbar">
  <div class="tb-logo">🌿</div>
  <div class="tb-search">
    <span class="tb-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Ат менен издөө..." oninput="doSearch(this.value)">
    <button class="tb-clear" id="clearBtn" onclick="clearSearch()" style="display:none">✕</button>
  </div>
  <button class="tb-reset" onclick="resetTree()">⟳ Баштапкы</button>
</div>

<div id="canvas">
  <div id="scene">
    <svg id="lines"></svg>
  </div>
</div>

<div id="srOverlay"></div>

<div id="adminLoginOverlay" class="admin-overlay" aria-hidden="true" style="display:none;">
  <div class="admin-box" role="dialog" aria-modal="true" aria-labelledby="adminLoginTitle">
    <div class="admin-header">
      <div class="admin-title" id="adminLoginTitle">Admin Girişi</div>
      <button class="admin-close" type="button" onclick="closeAdminLogin()" aria-label="Kapat">✕</button>
    </div>
    <form class="admin-form" onsubmit="handleAdminLogin(event)">
      <div class="admin-field">
        <label for="adminUsername">Kullanıcı adı</label>
        <input id="adminUsername" autocomplete="username" value="admin" required>
      </div>
      <div class="admin-field">
        <label for="adminPassword">Şifre</label>
        <input id="adminPassword" type="password" autocomplete="current-password" required>
      </div>
      <div class="admin-actions">
        <button class="admin-btn primary" type="submit">Giriş Yap</button>
        <button class="admin-btn secondary" type="button" onclick="closeAdminLogin()">İptal</button>
      </div>
      <div id="adminLoginStatus" class="admin-status"></div>
    </form>
  </div>
</div>

<div id="adminPanel" class="admin-panel" aria-hidden="true" style="display:none;">
  <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <div class="panel-title">Admin Panel</div>
    <button class="admin-close" type="button" onclick="hideAdminPanel()" aria-label="Kapat">✕</button>
  </div>
  <div class="panel-row">
    <div class="admin-note">Yeni kişi ekleyebilir, seçili kişiyi güncelleyebilir veya silebilirsiniz. Değişiklikler tarayıcıda saklanır.</div>
  </div>
  <div class="panel-row">
    <label class="admin-field">Kişi seç
      <select id="personSelect" onchange="selectManagedPerson()"><option value="">-- Kişi seç --</option></select>
    </label>
    <label class="admin-field">Ebeveyn
      <select id="parentSelect"></select>
    </label>
  </div>
  <div class="panel-row">
    <label class="admin-field">Ad
      <input id="personName" placeholder="Yeni veya mevcut kişi adı" required>
    </label>
    <label class="admin-field">Cinsiyet
      <select id="personGender"><option value="m">Erkek</option><option value="f">Kadın</option></select>
    </label>
  </div>
  <div class="panel-row">
    <div class="admin-actions">
      <button class="admin-btn primary" type="button" onclick="addManagedPerson()">Ekle</button>
      <button class="admin-btn secondary" type="button" onclick="updateManagedPerson()">Güncelle</button>
      <button class="admin-btn secondary" type="button" onclick="deleteManagedPerson()">Sil</button>
      <button class="admin-btn secondary" type="button" onclick="logoutAdmin()">Çıkış</button>
    </div>
  </div>
  <div id="adminPanelStatus" class="admin-status"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="openAdminPanel()" title="Admin">⚙</button>
  <button class="ctrl-btn" onclick="fitAll()" title="Сыйдыруу">⊡</button>
  <button class="ctrl-btn" onclick="zoomBy(1.2)">+</button>
  <button class="ctrl-btn" onclick="zoomBy(0.8)">−</button>
</div>

var nodeMap={}, parentMap={};
var ADMIN_USER="admin";
var ADMIN_HASH="a02ec992fd1ac20887e2eb95ba6cd5e3e01635599bf796992b301d15bb19c258";
var TREE_STORAGE_KEY="arzykul_tree_data";
var adminAuthenticated=false;

function indexTree(n, par){
  nodeMap[n.id]=n;
  parentMap[n.id]=par||null;
  if(n.children) n.children.forEach(function(c){indexTree(c,n.id);});
}

function buildIndex(){
  nodeMap={}; parentMap={};
  indexTree(TREE, null);
}

function hashText(text){
  if(!window.crypto||!window.crypto.subtle){
    return Promise.resolve(text);
  }
  var encoder=new TextEncoder();
  return window.crypto.subtle.digest("SHA-256", encoder.encode(text)).then(function(hash){
    var hex=[];
    var view=new Uint8Array(hash);
    view.forEach(function(b){ hex.push(("00"+b.toString(16)).slice(-2)); });
    return hex.join("");
  });
}

function loadSavedTree(){
  try{
    var raw=localStorage.getItem(TREE_STORAGE_KEY);
    if(!raw) return;
    var saved=JSON.parse(raw);
    if(saved && typeof saved === "object" && saved.id){
      TREE = saved;
    }
  }catch(e){}
}

function saveTree(){
  try{
    localStorage.setItem(TREE_STORAGE_KEY, JSON.stringify(TREE));
  }catch(e){}
}

function authenticatedFromSession(){
  adminAuthenticated = sessionStorage.getItem("adminLoggedIn") === "1";
}

function openAdminPanel(){
  if(!adminAuthenticated){
    openAdminLogin();
    return;
  }
  showAdminPanel();
}

function openAdminLogin(){
  var overlay=document.getElementById("adminLoginOverlay");
  if(!overlay) return;
  overlay.classList.add("open");
  overlay.style.display="block";
  overlay.setAttribute("aria-hidden","false");
  document.getElementById("adminUsername").focus();
}

function closeAdminLogin(){
  var overlay=document.getElementById("adminLoginOverlay");
  if(!overlay) return;
  overlay.classList.remove("open");
  overlay.style.display="none";
  overlay.setAttribute("aria-hidden","true");
  var status=document.getElementById("adminLoginStatus");
  if(status) status.textContent="";
}

function showAdminPanel(){
  refreshAdminSelectors();
  var panel=document.getElementById("adminPanel");
  if(panel){
    panel.classList.add("open");
    panel.style.display="block";
    panel.setAttribute("aria-hidden","false");
  }
  var status=document.getElementById("adminPanelStatus");
  if(status) status.textContent="";
}

function hideAdminPanel(){
  var panel=document.getElementById("adminPanel");
  if(panel){
    panel.classList.remove("open");
    panel.style.display="none";
    panel.setAttribute("aria-hidden","true");
  }
}

function handleAdminLogin(e){
  e.preventDefault();
  var username=document.getElementById("adminUsername").value.trim();
  var password=document.getElementById("adminPassword").value;
  var status=document.getElementById("adminLoginStatus");
  if(!username||!password){
    if(status){ status.textContent="Kullanıcı adı ve şifre gerekli."; status.className="admin-status error"; }
    return;
  }
  if(username!==ADMIN_USER){
    if(status){ status.textContent="Kullanıcı adı veya şifre yanlış."; status.className="admin-status error"; }
    return;
  }
  hashText(password).then(function(hash){
    if(hash===ADMIN_HASH){
      adminAuthenticated=true;
      sessionStorage.setItem("adminLoggedIn","1");
      if(status){ status.textContent="Giriş başarılı. Admin panel açılıyor..."; status.className="admin-status success"; }
      closeAdminLogin();
      showAdminPanel();
      setTimeout(function(){ if(status) status.textContent=""; }, 1800);
    } else {
      if(status){ status.textContent="Kullanıcı adı veya şifre yanlış."; status.className="admin-status error"; }
    }
  });
}

function logoutAdmin(){
  adminAuthenticated=false;
  sessionStorage.removeItem("adminLoggedIn");
  hideAdminPanel();
  var status=document.getElementById("adminPanelStatus");
  if(status){ status.textContent="Admin oturumu kapatıldı."; status.className="admin-status"; }
}

function refreshAdminSelectors(){
  buildIndex();
  var parentSelect=document.getElementById("parentSelect");
  var personSelect=document.getElementById("personSelect");
  if(!parentSelect||!personSelect) return;
  var ids=Object.keys(nodeMap).sort(function(a,b){ return nodeMap[a].name.localeCompare(nodeMap[b].name); });

  ids.forEach(function(id){

    parentSelect.appendChild(opt);

function selectManagedPerson(){
  var select=document.getElementById("personSelect");
  var id=select.value;
  var status=document.getElementById("adminPanelStatus");
  if(!id){
    document.getElementById("personName").value="";
    document.getElementById("personGender").value="m";
    if(status){ status.textContent="Yeni kişi ekleyebilirsiniz."; status.className="admin-status"; }

  }

    document.getElementById("parentSelect").value=parentMap[id]||"mandagul";
    if(status){ status.textContent="Seçilen kişi düzenlemek için hazır."; status.className="admin-status"; }
  }
}

function findParentObject(id){
  var pid=parentMap[id];
  return pid?nodeMap[pid]:null;
}

function isDescendant(ancestorId, descendantId){
  var current=parentMap[descendantId];
  while(current){
    if(current===ancestorId) return true;
    current=parentMap[current];
  }
  return false;
}

function removeNodeById(id){
  var parent=findParentObject(id);
  if(!parent||!parent.children) return false;
  for(var i=0;i<parent.children.length;i++){
    if(parent.children[i].id===id){ parent.children.splice(i,1); return true; }
  }
  return false;
}

function addManagedPerson(){
  var name=document.getElementById("personName").value.trim();
  var gender=document.getElementById("personGender").value;
  var parentId=document.getElementById("parentSelect").value;
  var status=document.getElementById("adminPanelStatus");
  if(!name){ if(status){ status.textContent="Bir isim giriniz."; status.className="admin-status error"; } return; }
  var parent=nodeMap[parentId]||TREE;
  if(!parent.children) parent.children=[];
  var id="custom_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  parent.children.push({id:id,name:name,f:gender==="f"?1:0});
  saveTree();
  buildIndex();
  refreshAdminSelectors();
  renderMap();
  if(status){ status.textContent="Kişi eklendi."; status.className="admin-status success"; }
}

function updateManagedPerson(){
  var selected=document.getElementById("personSelect").value;
  var name=document.getElementById("personName").value.trim();
  var gender=document.getElementById("personGender").value;
  var targetParent=document.getElementById("parentSelect").value;
  var status=document.getElementById("adminPanelStatus");
  if(!selected){ if(status){ status.textContent="Düzenlemek için bir kişi seçin."; status.className="admin-status error"; } return; }
  if(!name){ if(status){ status.textContent="Bir isim giriniz."; status.className="admin-status error"; } return; }
  var node=nodeMap[selected];
  if(!node){ if(status){ status.textContent="Seçilen kişi bulunamadı."; status.className="admin-status error"; } return; }
  node.name=name;
  node.f=(gender==="f"?1:0);
  if(targetParent && targetParent!==selected){
    if(isDescendant(selected,targetParent)){
      if(status){ status.textContent="Geçersiz ebeveyn seçimi."; status.className="admin-status error"; }
      return;
    }
    var currentParent=findParentObject(selected);
    var newParent=nodeMap[targetParent]||TREE;
    if(currentParent){ removeNodeById(selected); }
    if(!newParent.children) newParent.children=[];
    newParent.children.push(node);
  }
  saveTree();
  buildIndex();
  refreshAdminSelectors();
  renderMap();
  if(status){ status.textContent="Kişi güncellendi."; status.className="admin-status success"; }
}

function deleteManagedPerson(){
  var selected=document.getElementById("personSelect").value;
  var status=document.getElementById("adminPanelStatus");
  if(!selected){ if(status){ status.textContent="Silmek için bir kişi seçin."; status.className="admin-status error"; } return; }
  if(selected===TREE.id){ if(status){ status.textContent="Kök kişi silinemez."; status.className="admin-status error"; } return; }
  if(!confirm("Seçili kişiyi ve altındaki tüm kişileri silmek istediğinizden emin misiniz?")) return;
  if(!removeNodeById(selected)){
    if(status){ status.textContent="Kişi silinemedi."; status.className="admin-status error"; }
    return;
  }
  saveTree();
  buildIndex();
  refreshAdminSelectors();
  renderMap();
  document.getElementById("personSelect").value="";
  document.getElementById("personName").value="";
  if(status){ status.textContent="Kişi silindi."; status.className="admin-status success"; }
}

function countDesc(n){
  if(!n.children||!n.children.length) return 0;
  return n.children.reduce(function(s,c){return s+1+countDesc(c);},0);
}
function ini(s){return s.slice(0,1).toUpperCase();}
function nodeW(n){return Math.max(130, n.name.length*9+82);}

/* ══════════════════════════
   MIND MAP STATE
   expanded: Set of expanded node ids
   positions: id -> {x,y,w,h}  (center of right edge = anchor out)
══════════════════════════ */
var expanded = {};   // id -> true/false (toggled)
var positions = {};  // id -> {x, y, w, h}
var NODE_H = 44;
var GAP_X = 200;     // horizontal gap between parent right edge and child left
var GAP_Y = 54;      // vertical spacing between siblings

/* ══════════════════════════
   PAN / ZOOM
══════════════════════════ */
var tx=0, ty=0, sc=1;
var drag={on:false,sx:0,sy:0,stx:0,sty:0};
var canvas=document.getElementById("canvas");
var scene=document.getElementById("scene");

canvas.addEventListener("mousedown",function(e){
  if(e.target.closest(".node")) return;
  drag={on:true,sx:e.clientX,sy:e.clientY,stx:tx,sty:ty};
});
window.addEventListener("mousemove",function(e){
  if(!drag.on) return;
  tx=drag.stx+(e.clientX-drag.sx); ty=drag.sty+(e.clientY-drag.sy);
  applyT();
});
window.addEventListener("mouseup",function(){drag.on=false;});
canvas.addEventListener("touchstart",function(e){
  if(e.touches.length===1&&!e.target.closest(".node")){
    var t=e.touches[0];
    drag={on:true,sx:t.clientX,sy:t.clientY,stx:tx,sty:ty};
  }
},{passive:true});
canvas.addEventListener("touchmove",function(e){
  if(!drag.on||e.touches.length!==1) return;
  var t=e.touches[0];
  tx=drag.stx+(t.clientX-drag.sx); ty=drag.sty+(t.clientY-drag.sy);
  applyT(); e.preventDefault();
},{passive:false});
canvas.addEventListener("touchend",function(){drag.on=false;});
canvas.addEventListener("wheel",function(e){
  e.preventDefault();
  var f=e.deltaY<0?1.1:0.9;
  var r=canvas.getBoundingClientRect();
  var mx=e.clientX-r.left, my=e.clientY-r.top;
  sc=Math.max(0.2,Math.min(4,sc*f));
  tx=mx-(mx-tx)*f; ty=my-(my-ty)*f;
  applyT();
},{passive:false});
function applyT(){scene.style.transform="translate("+tx+"px,"+ty+"px) scale("+sc+")";}
function zoomBy(f){
  var cw=canvas.clientWidth,ch=canvas.clientHeight;
  sc=Math.max(0.2,Math.min(4,sc*f));
  tx=cw/2-(cw/2-tx)*f; ty=ch/2-(ch/2-ty)*f;
  applyT();
}
function fitAll(){
  var els=scene.querySelectorAll(".node");
  if(!els.length) return;
  var mn={x:Infinity,y:Infinity}, mx={x:-Infinity,y:-Infinity};
  els.forEach(function(el){
    var l=parseFloat(el.style.left)||0, t=parseFloat(el.style.top)||0;
    var w=el.offsetWidth||160, h=NODE_H;
    mn.x=Math.min(mn.x,l); mn.y=Math.min(mn.y,t);
    mx.x=Math.max(mx.x,l+w); mx.y=Math.max(mx.y,t+h);
  });
  var cw=canvas.clientWidth, ch=canvas.clientHeight;
  var pw=mx.x-mn.x+80, ph=mx.y-mn.y+80;
  sc=Math.min(Math.max(0.25,Math.min(cw/pw,ch/ph)),1.4);
  tx=(cw-pw*sc)/2-mn.x*sc+40*sc;
  ty=(ch-ph*sc)/2-mn.y*sc+40*sc;
  applyT();
}

/* ══════════════════════════
   LAYOUT ENGINE
   Recursively assign y positions (subtree height),
   then place nodes with fixed x = depth * (nodeW + GAP_X)
══════════════════════════ */

// Returns total height consumed by subtree of n (if expanded)
function subtreeH(n){
  if(!expanded[n.id]||!n.children||!n.children.length) return NODE_H;
  var sum=0;
  n.children.forEach(function(c){sum+=subtreeH(c)+GAP_Y-NODE_H;});
  sum+=NODE_H; // last child
  // actually: total = children.length * NODE_H + (children.length-1) * (GAP_Y - NODE_H)
  // simpler: sum of each child subtreeH + gaps between
  return sum;
}

function subtreeHeight(n){
  if(!expanded[n.id]||!n.children||!n.children.length) return NODE_H;
  var total=0;
  n.children.forEach(function(c,i){
    if(i>0) total+=GAP_Y-NODE_H; // gap between siblings
    total+=subtreeHeight(c);
  });
  return total;
}

// Place node n at left=x, center-y=cy
// Returns array of {id,x,y,w,h,data} and edges {x1,y1,x2,y2}
function layout(n, x, cy, nodesArr, edgesArr, parentAnchor){
  var w=nodeW(n), h=NODE_H;
  var top=cy-h/2;
  positions[n.id]={x:x,y:top,w:w,h:h};
  nodesArr.push({id:n.id, x:x, y:top, w:w, h:h, data:n});

  if(parentAnchor){
    edgesArr.push({
      x1:parentAnchor.x, y1:parentAnchor.y,
      x2:x,              y2:cy
    });
  }

  if(expanded[n.id]&&n.children&&n.children.length){
    var childX=x+w+GAP_X;
    // compute total height of all children subtrees + gaps
    var totalH=0;
    n.children.forEach(function(c,i){
      if(i>0) totalH+=(GAP_Y-NODE_H);
      totalH+=subtreeHeight(c);
    });
    var startCY=cy-totalH/2+subtreeHeight(n.children[0])/2;
    var curCY=cy-totalH/2;
    n.children.forEach(function(c){
      var ch=subtreeHeight(c);
      var childCY=curCY+ch/2;
      layout(c, childX, childCY, nodesArr, edgesArr, {x:x+w, y:cy});
      curCY+=ch+(GAP_Y-NODE_H);
    });
  }
}

/* ══════════════════════════
   RENDER
══════════════════════════ */
var domNodes={}; // id -> el  (persistent DOM elements)
var domLines={}; // edgeKey -> path el

function expandNode(id){
  if(!nodeMap[id]) return;
  var n=nodeMap[id];
  if(!n.children||!n.children.length) return;

  // toggle
  if(expanded[id]){
    // collapse: remove this and all descendants
    collapseSubtree(id);
  } else {
    expanded[id]=true;
  }
  renderMap();
  
  // Auto-pan to show the expanded node
  setTimeout(function(){
    var pos=positions[id];
    if(pos){
      var cw=document.getElementById("canvas").clientWidth;
      var ch=document.getElementById("canvas").clientHeight;
      var nodeX=pos.x+pos.w/2;
      var nodeY=pos.y+pos.h/2;
      // Center the node on screen with smooth animation
      var targetTx=cw/2-nodeX*sc;
      var targetTy=ch/2-nodeY*sc;
      animatePan(targetTx, targetTy, 400);
    }
  },50);
}

function animatePan(targetTx, targetTy, duration){
  var startTx=tx, startTy=ty;
  var startTime=Date.now();
  
  function ease(t){
    // ease-out cubic
    t=Math.min(1,t);
    return 1-Math.pow(1-t,3);
  }
  
  function frame(){
    var now=Date.now();
    var elapsed=now-startTime;
    var progress=Math.min(1, elapsed/duration);
    var t=ease(progress);
    tx=startTx+(targetTx-startTx)*t;
    ty=startTy+(targetTy-startTy)*t;
    applyT();
    if(progress<1){
      requestAnimationFrame(frame);
    }
  }
  
  requestAnimationFrame(frame);
}

function collapseSubtree(id){
  expanded[id]=false;
  var n=nodeMap[id];
  if(n.children) n.children.forEach(function(c){collapseSubtree(c.id);});
}

function resetTree(){
  // collapse all except root
  Object.keys(expanded).forEach(function(k){expanded[k]=false;});
  expanded["mandagul"]=true;
  renderMap();
  setTimeout(fitAll,60);
}

function renderMap(){
  var nodesArr=[], edgesArr=[];
  // start root at x=40, cy=300
  layout(TREE, 40, 300, nodesArr, edgesArr, null);

  // ── update SVG lines ──
  var svg=document.getElementById("lines");
  // collect current edge keys
  var newEdgeKeys={};
  edgesArr.forEach(function(e){
    var key=e.x1+","+e.y1+","+e.x2+","+e.y2;
    newEdgeKeys[key]=e;
  });
  // remove stale
  Object.keys(domLines).forEach(function(k){
    if(!newEdgeKeys[k]){domLines[k].remove();delete domLines[k];}
  });
  // add new
  Object.keys(newEdgeKeys).forEach(function(k){
    if(!domLines[k]){
      var e=newEdgeKeys[k];
      var path=document.createElementNS("http://www.w3.org/2000/svg","path");
      var mx=(e.x1+e.x2)/2;
      path.setAttribute("d","M "+e.x1+" "+e.y1+" C "+mx+" "+e.y1+" "+mx+" "+e.y2+" "+e.x2+" "+e.y2);
      path.setAttribute("fill","none");
      path.setAttribute("stroke","rgba(212,165,116,.28)");
      path.setAttribute("stroke-width","2");
      path.setAttribute("stroke-linecap","round");
      svg.appendChild(path);
      domLines[k]=path;
    }
  });
  // update SVG size
  var maxX=0,maxY=0;
  nodesArr.forEach(function(nd){maxX=Math.max(maxX,nd.x+nd.w+80);maxY=Math.max(maxY,nd.y+nd.h+80);});
  svg.setAttribute("width",Math.max(maxX,800));
  svg.setAttribute("height",Math.max(maxY,600));

  // ── update node DOM elements ──
  var newIds={};
  nodesArr.forEach(function(nd){newIds[nd.id]=nd;});

  // remove nodes no longer in layout
  Object.keys(domNodes).forEach(function(id){
    if(!newIds[id]){domNodes[id].remove();delete domNodes[id];}
  });

  // update or create nodes
  nodesArr.forEach(function(nd){
    var n=nd.data;
    var hasKids=n.children&&n.children.length>0;
    var isExp=!!expanded[n.id];
    var cd=countDesc(n);

    if(!domNodes[nd.id]){
      // create
      var el=document.createElement("div");
      domNodes[nd.id]=el;
      scene.appendChild(el);
      if(hasKids){
        (function(id){
          el.addEventListener("click",function(e){e.stopPropagation();expandNode(id);});
        })(nd.id);
      }
    }
    var el=domNodes[nd.id];
    // update classes
    var cls="node"
      +(isExp?" expanded":"")
      +(n.f?" female":"")
      +(hasKids?" has-kids":" leaf-node");
    el.className=cls;
    // update position
    el.style.left=nd.x+"px";
    el.style.top=nd.y+"px";
    el.style.width=nd.w+"px";
    // update content
    var inner='<div class="n-av">'+ini(n.name)+'</div>'
      +'<div class="n-nm">'+n.name+'</div>';
    if(hasKids) inner+='<div class="n-ct">'+cd+'</div>';
    el.innerHTML=inner;
  });
}

══════════════════════════ */
function doSearch(q){
  document.getElementById("clearBtn").style.display=q?"block":"none";
  var ov=document.getElementById("srOverlay");
  if(!q||q.length<2){ov.style.display="none";return;}
  var res=[];
  for(var id in nodeMap){
    if(nodeMap[id].name.toLowerCase().indexOf(q.toLowerCase())>=0) res.push(nodeMap[id]);
  }
  ov.style.display="block";
  if(!res.length){ov.innerHTML='<div class="sr-none">Табылган жок — "'+q+'"</div>';return;}
  var html="";
  res.slice(0,16).forEach(function(n){
    // build path
    var p=[],pid=parentMap[n.id];
    while(pid){p.unshift(nodeMap[pid].name);pid=parentMap[pid];}
    html+='<div class="sr-item" onclick="jumpTo(\''+n.id+'\')">'+(n.f?"♀ ":"")+n.name+'<div class="sr-path">'+p.join(" › ")+'</div></div>';
  });
  ov.innerHTML=html;
}
function clearSearch(){
  document.getElementById("searchInput").value="";
  document.getElementById("clearBtn").style.display="none";
  document.getElementById("srOverlay").style.display="none";
}
function jumpTo(id){
  clearSearch();
  // expand all ancestors
  var pid=parentMap[id];
  while(pid){expanded[pid]=true;pid=parentMap[pid];}
  renderMap();
  // scroll to node
  setTimeout(function(){
    var el=domNodes[id];
    if(!el) return;
    var l=parseFloat(el.style.left)||0, t=parseFloat(el.style.top)||0;
    var cw=canvas.clientWidth, ch=canvas.clientHeight;
    tx=cw/2-l*sc-80*sc; ty=ch/2-t*sc-22*sc;
    applyT();
  },60);
}

document.addEventListener("keydown",function(e){
  if(e.key==="Escape") clearSearch();
});
